name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  root-and-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Root install and checks
        run: |
          npm ci
          npm run build --if-present
          npm test --if-present
      - name: Frontend install and checks
        run: |
          cd profilesapp
          npm ci
          npm run build --if-present
          npm test --if-present
